<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestor de Tareas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>TaskFlow</h1>
            <p>Gestiona tus tareas de manera eficiente</p>
        </header>
        
        <main class="main-content">
            <section class="task-input-section">
                <h2>Nueva Tarea</h2>
                <form id="task-form">
                    <input type="text" id="task-input" placeholder="Escribe tu tarea..." required>
                    <select id="task-priority">
                        <option value="baja">Baja</option>
                        <option value="media" selected>Media</option>
                        <option value="alta">Alta</option>
                    </select>
                    <button type="submit" class="add-btn">Añadir Tarea</button>
                </form>
            </section>
            
            <section class="task-filters">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendientes</button>
                <button class="filter-btn" data-filter="completed">Completadas</button>
            </section>
            
            <section class="tasks-list">
                <h2>Tareas</h2>
                <div id="tasks-container">
                    <!-- Las tareas se añadirán dinámicamente aquí -->
                </div>
            </section>
        </main>
        
        <footer class="footer">
            <p>&copy; 2024 TaskFlow. Creado con TypeScript.</p>
        </footer>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
